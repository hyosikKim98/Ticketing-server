openapi: 3.0.3
info:
  title: Ticketing Server API
  version: 1.0.0
  description: API for JWT auth, event lookup, queue control, and asynchronous payment requests.
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []
paths:
  /api/auth/signup:
    post:
      summary: Sign up
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: Created
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/auth/login:
    post:
      summary: Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/events:
    get:
      summary: List events
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventResponse'
  /api/events/{eventId}:
    get:
      summary: Get event
      security: []
      parameters:
        - in: path
          name: eventId
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/queue/{eventId}/enter:
    post:
      summary: Enter queue
      parameters:
        - in: path
          name: eventId
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueEnterResponse'
  /api/queue/{eventId}/me:
    get:
      summary: Get my queue status
      parameters:
        - in: path
          name: eventId
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueMeResponse'
  /api/queue/{eventId}/token:
    get:
      summary: Get current entry token for the authenticated user
      description: Test profile only. Returns 404 when disabled or when no token exists.
      parameters:
        - in: path
          name: eventId
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueTokenResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/queue/{eventId}/issue:
    post:
      summary: Issue entry tokens to top N queued users
      parameters:
        - in: path
          name: eventId
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueQueueRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueQueueResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      security:
        - bearerAuth: []
  /api/payments/request:
    post:
      summary: Publish payment request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentRequestCreateRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentRequestCreateResponse'
        '403':
          description: Invalid or expired entry token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: Duplicate request or sold out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ApiErrorResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]
    SignupRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 100
      required: [email, password]
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]
    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
      required: [accessToken]
    EventResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        venue:
          type: string
        startsAt:
          type: string
          format: date-time
      required: [id, name, venue, startsAt]
    QueueEnterResponse:
      type: object
      properties:
        eventId:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        position:
          type: integer
          format: int64
      required: [eventId, userId, position]
    QueueMeResponse:
      type: object
      properties:
        eventId:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        position:
          type: integer
          format: int64
        hasEntryToken:
          type: boolean
      required: [eventId, userId, position, hasEntryToken]
    QueueTokenResponse:
      type: object
      properties:
        eventId:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        entryToken:
          type: string
        expiresInSeconds:
          type: integer
          format: int64
      required: [eventId, userId, entryToken]
    IssueQueueRequest:
      type: object
      properties:
        count:
          type: integer
          minimum: 1
      required: [count]
    IssuedTokenResponse:
      type: object
      properties:
        userId:
          type: integer
          format: int64
        entryToken:
          type: string
      required: [userId, entryToken]
    IssueQueueResponse:
      type: object
      properties:
        eventId:
          type: integer
          format: int64
        issuedCount:
          type: integer
        issued:
          type: array
          items:
            $ref: '#/components/schemas/IssuedTokenResponse'
      required: [eventId, issuedCount, issued]
    PaymentRequestCreateRequest:
      type: object
      properties:
        eventId:
          type: integer
          format: int64
        entryToken:
          type: string
        seatOption:
          type: string
          maxLength: 50
        amount:
          type: integer
          format: int64
          minimum: 1
        idempotencyKey:
          type: string
          nullable: true
      required: [eventId, entryToken, seatOption, amount]
    PaymentRequestCreateResponse:
      type: object
      properties:
        idempotencyKey:
          type: string
        status:
          type: string
      required: [idempotencyKey, status]
