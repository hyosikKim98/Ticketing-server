spring:
  application:
    name: ticketing-server
  datasource:
    url: jdbc:postgresql://localhost:5432/ticketing
    username: ticket
    password: ticket
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092

logging:
  level:
    com.example.ticketing: INFO

app:
  jwt:
    secret: change-me-to-at-least-32-bytes-secret-key-for-jjwt
    expiration-millis: 3600000
