spring:
  application:
    name: ticketing-server
  datasource:
    url: jdbc:postgresql://localhost:5432/ticketing
    username: ticket
    password: ticket
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      enable-auto-commit: false
      auto-offset-reset: earliest
    producer:
      acks: all
      retries: 10
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
    listener:
      ack-mode: manual_immediate

logging:
  level:
    com.example.ticketing: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

app:
  jwt:
    secret: change-me-to-at-least-32-bytes-secret-key-for-jjwt
    expiration-millis: 3600000
  queue:
    entry-token-ttl: 10m
    payment-guard-ttl: 10m
    max-active-slots: 20
    test-token-endpoint-enabled: false
  seed:
    enabled: false
